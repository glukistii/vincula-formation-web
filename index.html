<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vincula Formation - Lecteur Vidéo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F1F35; color: #FFF; line-height: 1.6; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header { background: #0A1628; border-bottom: 2px solid #0D9488; padding: 20px 0; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
    header .brand { flex: 1; }
    header h1 { font-size: 28px; }
    header p { color: #CBD5E1; margin-top: 5px; }
    .auth-btn { background: #0D9488; color: #0A1628; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; transition: all 0.3s; }
    .auth-btn:hover { background: #0FAB96; transform: translateY(-2px); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: #0A1628; border: 2px solid #0D9488; border-radius: 8px; padding: 40px; max-width: 500px; width: 90%; }
    .modal-content h2 { color: #0D9488; margin-bottom: 20px; font-size: 24px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; color: #CBD5E1; margin-bottom: 5px; font-size: 14px; }
    .form-group input { width: 100%; padding: 12px; background: #0F1F35; border: 1px solid #1E293B; border-radius: 6px; color: #FFF; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #0D9488; }
    .form-btn { width: 100%; padding: 12px; background: #0D9488; color: #0A1628; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
    .form-btn:hover { background: #0FAB96; }
    .toggle-form { text-align: center; margin-top: 15px; color: #CBD5E1; font-size: 13px; }
    .toggle-form a { color: #0D9488; cursor: pointer; text-decoration: underline; }
    .close-modal { float: right; font-size: 28px; color: #CBD5E1; cursor: pointer; margin-top: -10px; }
    .user-info { color: #0D9488; font-weight: bold; }
    .logout-btn { background: #CA8A04; padding: 8px 15px; font-size: 12px; }
    .logout-btn:hover { background: #E8A715; }
    main { display: grid; grid-template-columns: 1fr 300px; gap: 2rem; }
    .video-player { background: #0A1628; border: 1px solid #0D9488; border-radius: 8px; padding: 20px; }
    .placeholder { aspect-ratio: 16/9; background: linear-gradient(135deg, #0D9488, #0A1628); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 80px; margin-bottom: 20px; }
    .description h2 { color: #0D9488; margin-bottom: 10px; }
    .description p { color: #CBD5E1; }
    .playlist { background: #0A1628; border: 1px solid #0D9488; border-radius: 8px; padding: 20px; position: sticky; top: 20px; height: fit-content; }
    .playlist h3 { color: #0D9488; margin-bottom: 15px; }
    .video-item { background: #0F1F35; border: 1px solid #1E293B; padding: 12px; border-radius: 6px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s; }
    .video-item:hover { border-color: #0D9488; background: #1E293B; }
    .video-item.active { background: #0D9488; color: #0A1628; border-color: #0D9488; }
    footer { border-top: 1px solid #0D9488; padding: 20px 0; margin-top: 40px; text-align: center; color: #CBD5E1; }
    .loading { color: #0D9488; padding: 40px; text-align: center; }
    @media (max-width: 768px) { main { grid-template-columns: 1fr; } .playlist { position: static; } }
  </style>
</head>
<body>
  <!-- Auth Modal -->
  <div id="authModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeAuthModal()">&times;</span>

      <div id="loginForm">
        <h2>Se Connecter</h2>
        <div class="form-group">
          <label>Email:</label>
          <input type="email" id="loginEmail" placeholder="votre@email.com">
        </div>
        <div class="form-group">
          <label>Mot de passe:</label>
          <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="form-btn" onclick="handleLogin()">Se Connecter</button>
        <div class="toggle-form">
          Pas encore de compte? <a onclick="toggleAuthForm()">Créer un compte</a>
        </div>
      </div>

      <div id="registerForm" style="display:none;">
        <h2>Créer un Compte</h2>
        <div class="form-group">
          <label>Nom complet:</label>
          <input type="text" id="registerName" placeholder="Votre Nom">
        </div>
        <div class="form-group">
          <label>Email:</label>
          <input type="email" id="registerEmail" placeholder="votre@email.com">
        </div>
        <div class="form-group">
          <label>Mot de passe:</label>
          <input type="password" id="registerPassword" placeholder="••••••••">
        </div>
        <button class="form-btn" onclick="handleRegister()">S'inscrire</button>
        <div class="toggle-form">
          Déjà un compte? <a onclick="toggleAuthForm()">Se connecter</a>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="brand">
        <h1>🎬 Vincula Formation</h1>
        <p>Lecteur vidéo & e-commerce</p>
      </div>
      <div id="authSection">
        <button class="auth-btn" onclick="openAuthModal()">🔐 Se Connecter</button>
      </div>
    </header>

    <main>
      <div class="video-player">
        <div id="loading" class="loading">Chargement des vidéos...</div>
        <div id="content" style="display:none;">
          <div class="placeholder">▶️</div>
          <div class="description">
            <h2 id="videoTitle">Titre</h2>
            <p id="videoDesc">Description</p>
          </div>
        </div>
      </div>

      <aside class="playlist">
        <h3>📚 Formations</h3>
        <div id="videoList"></div>
      </aside>
    </main>

    <footer>
      <p>© 2024 Vincula Formation • Formations vidéo professionnelles</p>
    </footer>
  </div>

  <script>
    let videos = [];
    let current = null;
    let currentUser = null;

    console.log('🚀 Script starting...');
    console.log('DOM ready:', document.readyState);

    // ===== AUTHENTIFICATION =====
    function openAuthModal() {
      document.getElementById('authModal').classList.add('active');
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
    }

    function closeAuthModal() {
      document.getElementById('authModal').classList.remove('active');
    }

    function toggleAuthForm() {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
      registerForm.style.display = registerForm.style.display === 'none' ? 'block' : 'none';
    }

    function handleLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        alert('⚠️ Veuillez remplir tous les champs');
        return;
      }

      // Simulation d'authentification
      currentUser = { email: email, name: email.split('@')[0] };
      console.log('✅ Connecté:', currentUser);

      closeAuthModal();
      updateAuthUI();
      alert('✅ Bienvenue ' + currentUser.name + '!');
    }

    function handleRegister() {
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;

      if (!name || !email || !password) {
        alert('⚠️ Veuillez remplir tous les champs');
        return;
      }

      currentUser = { email: email, name: name };
      console.log('✅ Compte créé:', currentUser);

      closeAuthModal();
      updateAuthUI();
      alert('✅ Compte créé avec succès! Bienvenue ' + currentUser.name + '!');
    }

    function handleLogout() {
      currentUser = null;
      console.log('❌ Déconnexion');
      updateAuthUI();
      alert('👋 Vous avez été déconnecté');
    }

    function updateAuthUI() {
      const authSection = document.getElementById('authSection');
      if (currentUser) {
        authSection.innerHTML = `
          <div style="display: flex; align-items: center; gap: 15px;">
            <span class="user-info">👤 ${currentUser.name}</span>
            <button class="auth-btn logout-btn" onclick="handleLogout()">📤 Déconnexion</button>
          </div>
        `;
      } else {
        authSection.innerHTML = '<button class="auth-btn" onclick="openAuthModal()">🔐 Se Connecter</button>';
      }
    }

    function initApp() {
      console.log('📡 Fetching videos from local API...');
      const apiUrl = '/api/videos';
      console.log('URL:', apiUrl);

      fetch(apiUrl)
        .then(r => {
          console.log('✅ Response received:', r.status, r.statusText);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(data => {
          console.log('✅ Data parsed. Videos count:', data.length);
          if (Array.isArray(data) && data.length > 0) {
            console.log('First video:', data[0]);
          } else {
            console.warn('⚠️ Data is not array or empty:', data);
          }
          return data;
        })
        .then(data => {
          videos = data;
          if (Array.isArray(videos) && videos.length) {
            current = 0;
            showVideo(0);
            renderPlaylist();
            console.log('✅ App initialized successfully with', videos.length, 'videos');
          } else {
            console.warn('⚠️ No videos returned from API');
            document.getElementById('loading').textContent = '⚠️ Aucune vidéo trouvée';
          }
        })
        .catch(err => {
          console.error('❌ Error:', err);
          document.getElementById('loading').textContent = `❌ Erreur: ${err.message}`;
        });
    }


    function showVideo(i) {
      current = i;
      const v = videos[i];
      console.log('📺 Showing video', i, ':', v.title.rendered);
      document.getElementById('videoTitle').textContent = v.title.rendered;
      document.getElementById('videoDesc').innerHTML = v.content.rendered;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.querySelectorAll('.video-item').forEach((el, idx) => {
        el.classList.toggle('active', idx === i);
      });
    }

    function renderPlaylist() {
      console.log('🎬 Rendering playlist with', videos.length, 'videos');
      const html = videos.map((v, i) => `
        <div class="video-item ${i === 0 ? 'active' : ''}" onclick="showVideo(${i})">
          🎥 ${v.title.rendered}
        </div>
      `).join('');
      document.getElementById('videoList').innerHTML = html;
    }

    // Start when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
      console.log('📋 DOM not ready yet, waiting for DOMContentLoaded...');
    } else {
      console.log('📋 DOM already ready, initializing now...');
      initApp();
    }
  </script>
</body>
</html>
